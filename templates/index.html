<!DOCTYPE html>
<html>
<head>
    <title>DevOps Auto Rollback Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">
    <h1>DevOps Auto Rollback Dashboard</h1>
    <p class="subtitle">Canteen Menu Server — Deployment & Monitoring</p>

    <div class="card">
        <h2>Deploy Application Version</h2>
        <form method="POST" action="/deploy">
            <select name="version">
                <option value="v1">v1 — Stable</option>
                <option value="v2">v2 — Updated Menu</option>
                <option value="v3">v3 — Slow Response</option>
                <option value="v4">v4 — Crash Version</option>
            </select>
            <button class="primary">Deploy & Start</button>
        </form>
    </div>

    <div class="card actions">
        <h2>Monitoring & Logs</h2>
        <a href="/start_monitor"><button>Start Monitor</button></a>
        <a href="/logs"><button>View System Logs</button></a>
    </div>

    <div class="footer">
        <p>Fundamentals of DevOps Mini Project</p>
    </div>
</div>

</body>
</html>
